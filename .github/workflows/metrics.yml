name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Updates every hour
  workflow_dispatch:               # Allows manual refresh
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # --- General Config ---
          user: CosmicMagnetar
          template: classic
          base: header, repositories
          config_timezone: Asia/Kolkata
          
          # --- The Spiderweb (Languages) ---
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_limit: 5
          plugin_languages_sections: most-used
          plugin_languages_details: percentage # This renders the Radar/Spiderweb
          
          # --- Activity (Issues & PRs) ---
          plugin_followup: yes
          plugin_followup_sections: user
          
          # --- Aesthetic (Matching your Screenshot) ---
          config_theme: tokyonight # Neon green/blue theme
          plugin_languages_colors: "github"
          plugin_languages_threshold: 0%