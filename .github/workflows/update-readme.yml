name: Update README with Dynamic Data

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate README with GitHub API data
        run: node generate-readme.js

      - name: Commit and Push
        run: |
          git config user.name "ReadmeBot"
          git config user.email "bot@github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update README with dynamic GitHub data" && git push)
