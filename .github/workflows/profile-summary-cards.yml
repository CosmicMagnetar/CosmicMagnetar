name: System-Radar-Update
on:
  schedule: [{cron: "0 * * * *"}] # Hourly update
  workflow_dispatch:               # Manual trigger
jobs:
  generate-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Make sure this secret exists!
          
          # --- Core Config ---
          user: CosmicMagnetar
          template: classic
          base: "" 
          config_theme: tokyonight # Neon aesthetic
          
          # --- THE SPIDERWEB (Radar Chart) ---
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_limit: 5             # 5 points for the pentagon web
          plugin_languages_sections: most-used
          # CRITICAL: This line forces the RADAR/SPIDERWEB layout
          plugin_languages_details: percentage 
          
          # --- THE ACTIVITY WEB (Optional, adds more "XP" data) ---
          plugin_followup: yes
          plugin_followup_sections: user
          
          # --- File Output ---
          filename: system-radar.svg