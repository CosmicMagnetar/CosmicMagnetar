name: Update README with Dynamic Data

on:
  schedule:
    - cron: "0 * * * *" # Updates every hour
  workflow_dispatch:   # Manual trigger button

jobs:
  update-readme:
    runs-on: ubuntu-latest
    # CRITICAL: This allows the action to save the spiderweb SVG to your repo
    permissions:
      contents: write
      
    steps:
      # Upgraded to v4 to resolve Node.js deprecation warnings
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Spiderweb Chart
        uses: vn7n24fzkq/github-profile-summary-cards@v0.6.0
        env:
          # This must match the name of the secret you created
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          username: CosmicMagnetar
          theme: aura_dark